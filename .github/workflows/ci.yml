name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync (core + dev)
        run: uv sync --group dev

      # Load-bearing architecture guard: the scoring core must never import the
      # orchestration layer (bikescore_app). Runs first, standalone, so a violation
      # fails CI even before the rest of the suite.
      - name: Import-direction guard (core must not import app)
        run: uv run pytest tests/test_import_guard.py -q

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict
