type: complete
version: 1
description: Standard BNA policy — complete snapshot of all package defaults.
config:
  globals:
    block_road_buffer: 15
    block_road_min_length: 30
    max_trip_distance: 2680
    min_bbox_length: 3300
    min_path_length: 4800
    output_srid: null
  cache:
    cache_dir: cache
  city:
    default_speed: null
    state_default_speed: null
    country: us
  connectivity:
    include_self_pairs: true
    use_turn_restrictions: false
    batches_per_worker: 4
    n_workers: null
    low_stress_ratio: 1.25
  export:
    base_dir: results
  graph:
    low_stress_threshold: 1
    extra_thresholds: []
    link_stress_model: max
  imputation:
    bare_speed_unit: km/h
    default_facility_width_ft: 5.0
  scoring:
    people: 15
    category_weights:
      opportunity: 20
      core_services: 20
      retail: 15
      recreation: 15
      transit: 15
    population:
      max_score: 1.0
      step1: 0.03
      score1: 0.1
      step2: 0.2
      score2: 0.4
      step3: 0.5
      score3: 0.8
  stress:
    crossing_speed_defaults:
      primary_speed: 40
      primary_lanes: 2
      secondary_speed: 40
      secondary_lanes: 2
      tertiary_speed: 30
      tertiary_lanes: 1
    level_names: {}
  destinations:
  - name: schools
    display_name: K-12 Schools
    node_match:
      any:
      - all:
        - field: amenity
          op: in
          value:
          - school
          - kindergarten
    area_match:
      any:
      - all:
        - field: amenity
          op: in
          value:
          - school
          - kindergarten
    exclude_match:
      any: []
    type: poi
    way_match:
      any: []
    clustering_tolerance_m: 0
    clustering_mode: no_cluster
    scoring_category: opportunity
    category_weight: 0.35
    scoring:
      first: 0.3
      second: 0.2
      third: 0.2
      max_score: 1.0
    human_explanation: K12 schools
    score_noun: schools
    score_noun_singular: school
    score_noun_access: ''
    enabled: true
    score_id: opportunity_k12_education
  - name: colleges
    display_name: Technical/Vocational Colleges
    node_match:
      any:
      - all:
        - field: amenity
          op: eq
          value: college
    area_match:
      any:
      - all:
        - field: amenity
          op: eq
          value: college
    exclude_match:
      any: []
    type: poi
    way_match:
      any: []
    clustering_tolerance_m: 100
    clustering_mode: poly_cluster
    scoring_category: opportunity
    category_weight: 0.1
    scoring:
      first: 0.7
      second: 0.0
      third: 0.0
      max_score: 1.0
    human_explanation: tech/vocational colleges
    score_noun: tech/vocational colleges
    score_noun_singular: tech/vocational college
    score_noun_access: ''
    enabled: true
    score_id: opportunity_technical_vocational_college
