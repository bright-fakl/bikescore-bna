  - name: access_ok
    extra_tags: []
    after:
    - access
    description: 'access IS NULL, or (access=no AND bicycle permitted), or access
      NOT IN (no, private). Was the access_filter provider.

      '
    compute:
      sets:
        bike_yes:
        - 'yes'
        - permissive
        - designated
      rules:
      - id: access_null
        when:
          access: is_null
        set:
          access_ok: true
      - id: access_no_bike
        when:
          access: 'no'
          bicycle: $bike_yes
        set:
          access_ok: true
      - id: access_permitted
        when:
          access:
            not_in:
            - 'no'
            - private
        set:
          access_ok: true
      default:
        access_ok: false
    persist: false
  - name: footway_wide
    extra_tags: []
    after:
    - width_parsed
    description: bicycle=designated OR width_ft >= 8. Was the tag_flags provider.
    compute:
      rules:
      - id: bike_designated
        when:
          bicycle: designated
        set:
          footway_wide: true
      - id: wide
        when:
          width_ft:
            ge: 8
        set:
          footway_wide: true
      default:
        footway_wide: false
    persist: false
  - name: is_golf_path
    extra_tags: []
    after:
    - golf
    - golf_cart
    description: golf IN (path, cartpath) OR golf_cart IN (yes, designated). Was tag_flags.
    compute:
      rules:
      - id: golf_path
        when:
          golf:
            in:
            - path
            - cartpath
        set:
          is_golf_path: true
      - id: golf_cart_yes
        when:
          golf_cart:
            in:
            - 'yes'
            - designated
        set:
          is_golf_path: true
      default:
        is_golf_path: false
    persist: false
  - name: cls_both_lane
    extra_tags: []
    after:
    - bike_infra
    description: 'ft_bike_infra AND tf_bike_infra both in (track, buffered_lane, lane).
      Drives residential/unclassified -> tertiary promotion. Was class_adjust_context.

      '
    compute:
      sets:
        infra:
        - track
        - buffered_lane
        - lane
      rules:
      - id: both_lane
        when:
          ft_bike_infra: $infra
          tf_bike_infra: $infra
        set:
          cls_both_lane: true
      default:
        cls_both_lane: false
    persist: false
  - name: cls_ft_multi
