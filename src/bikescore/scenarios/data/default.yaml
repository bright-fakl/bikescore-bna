              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_opp_cw_r_lane_r_buf
              when:
                cycleway:right: opposite_lane
                cycleway:right:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_opp_cw_l_ow_m1_track
              when:
