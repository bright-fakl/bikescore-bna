                cycleway:left: track
              set:
                <dir>_bike_infra: track
            - id: <dir>_opp_cw_r_ow_m1_track
              when:
                cycleway:right:oneway: '-1'
                cycleway:right: track
              set:
                <dir>_bike_infra: track
            - id: <dir>_opp_cw_l_ow_m1_lane_buf
              when:
                cycleway:left:oneway: '-1'
                cycleway:left: lane
                cycleway:left:buffer: 'yes'
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_opp_cw_r_ow_m1_lane_buf
              when:
                cycleway:right:oneway: '-1'
                cycleway:right: lane
                cycleway:right:buffer: 'yes'
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_opp_cw_l_ow_m1_lane
              when:
                cycleway:left:oneway: '-1'
                cycleway:left: lane
              set:
                <dir>_bike_infra: lane
            - id: <dir>_opp_cw_r_ow_m1_lane
              when:
                cycleway:right:oneway: '-1'
                cycleway:right: lane
              set:
                <dir>_bike_infra: lane
            - id: <dir>_opp_cw_lane
              when:
                cycleway: opposite_lane
              set:
                <dir>_bike_infra: lane
            - id: <dir>_opp_cw_r_lane
              when:
                cycleway:right: opposite_lane
              set:
                <dir>_bike_infra: lane
            - id: <dir>_opp_cw_track
              when:
                cycleway: opposite_track
              set:
                <dir>_bike_infra: track
            - id: <dir>_opp_cw_l_track
              when:
                cycleway:left: opposite_track
              set:
                <dir>_bike_infra: track
            - id: <dir>_opp_cw_r_track
              when:
                cycleway:right: opposite_track
              set:
                <dir>_bike_infra: track
          - id: <dir>_owc_absent
            when:
              one_way_car: absent
            rules:
            - id: <dir>_two_cw_sharrow
              when:
                cycleway: shared_lane
              set:
                <dir>_bike_infra: sharrow
            - id: <dir>_two_cw_p_sharrow
              when:
                cycleway:<two_prim>: shared_lane
              set:
                <dir>_bike_infra: sharrow
            - id: <dir>_two_cw_o_sharrow
              when:
                cycleway:<two_off>: shared_lane
                cycleway:<two_off>:oneway: $<off_set>
              set:
                <dir>_bike_infra: sharrow
            - id: <dir>_two_cw_buffered_lane
              when:
                cycleway: buffered_lane
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_two_cw_p_buffered_lane
              when:
                cycleway:<two_prim>: buffered_lane
                cycleway:<two_prim>:oneway:
                  ne: <prim_excl>
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_two_cw_o_buffered_lane
              when:
                cycleway:<two_off>: buffered_lane
                cycleway:<two_off>:oneway: $<off_set>
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_two_cw_lane_buf
              when:
                cycleway: lane
                cycleway:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_two_cw_p_lane_buf
              when:
                cycleway:<two_prim>: lane
                cycleway:<two_prim>:oneway:
                  ne: <prim_excl>
                cycleway:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_two_cw_p_lane_p_buf
              when:
                cycleway:<two_prim>: lane
                cycleway:<two_prim>:oneway:
                  ne: <prim_excl>
                cycleway:<two_prim>:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_two_cw_o_lane_o_buf
              when:
                cycleway:<two_off>: lane
                cycleway:<two_off>:oneway: $<off_set>
                cycleway:<two_off>:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_two_cw_lane
              when:
                cycleway: lane
              set:
                <dir>_bike_infra: lane
            - id: <dir>_two_cw_p_lane
              when:
                cycleway:<two_prim>: lane
                cycleway:<two_prim>:oneway:
                  ne: <prim_excl>
              set:
                <dir>_bike_infra: lane
            - id: <dir>_two_cw_o_lane
              when:
                cycleway:<two_off>: lane
                cycleway:<two_off>:oneway: $<off_set>
              set:
                <dir>_bike_infra: lane
            - id: <dir>_two_cw_track
              when:
                cycleway: track
              set:
                <dir>_bike_infra: track
            - id: <dir>_two_cw_p_track
              when:
                cycleway:<two_prim>: track
                cycleway:<two_prim>:oneway:
                  ne: <prim_excl>
              set:
                <dir>_bike_infra: track
            - id: <dir>_two_cw_o_track
              when:
                cycleway:<two_off>: track
                cycleway:<two_off>:oneway: $<off_set>
              set:
                <dir>_bike_infra: track
        default: {}
      - name: one_way
        rules:
        - id: one_way_ft
          when:
            one_way_car: ft
            tf_bike_infra: absent
            oneway:bicycle:
              ne: 'no'
          set:
            one_way: ft
        - id: one_way_tf
          when:
            one_way_car: tf
            ft_bike_infra: absent
            oneway:bicycle:
              ne: 'no'
          set:
            one_way: tf
        default:
          one_way: null
  - name: bike_infra_width
    extra_tags:
    - cycleway:right:width
    - cycleway:left:width
    - cycleway:both:width
    - cycleway:width
    after:
    - bike_infra
    description: 'ft/tf_bike_infra_width from cycleway width tags using parse_width_ft
      transform. Priority: right (ft) / left (tf) > side-of-one-way-opposite > both
      > generic. Only set where the corresponding bike_infra column is non-null.

      '
    compute:
      rules:
      - id: ft_w_from_right
        when:
          ft_bike_infra: present
          cycleway:right:width: present
        set:
          ft_bike_infra_width:
            $apply: parse_width_ft
            to: cycleway:right:width
      - id: ft_w_from_left_ft
        when:
          ft_bike_infra: present
          one_way_car: ft
          cycleway:left:width: present
        set:
          ft_bike_infra_width:
            $apply: parse_width_ft
            to: cycleway:left:width
      - id: ft_w_from_both
        when:
          ft_bike_infra: present
          cycleway:both:width: present
        set:
          ft_bike_infra_width:
            $apply: parse_width_ft
            to: cycleway:both:width
      - id: ft_w_from_generic
        when:
          ft_bike_infra: present
          cycleway:width: present
        set:
          ft_bike_infra_width:
            $apply: parse_width_ft
            to: cycleway:width
      - id: tf_w_from_left
        when:
          tf_bike_infra: present
          cycleway:left:width: present
        set:
          tf_bike_infra_width:
            $apply: parse_width_ft
            to: cycleway:left:width
      - id: tf_w_from_right_tf
        when:
          tf_bike_infra: present
          one_way_car: tf
          cycleway:right:width: present
        set:
          tf_bike_infra_width:
