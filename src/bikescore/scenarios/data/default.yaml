  intersection_attributes:
  - name: signalized
    match:
    - highway: traffic_signals
    enabled: true
  - name: stop
    match:
    - highway: stop
      stop: all
    enabled: true
  - name: rrfb
    match:
    - highway: crossing
      flashing_lights:
      - 'yes'
      - button
      - always
      - sensor
    enabled: true
  - name: island
    match:
    - highway: crossing
      crossing: island
    - highway: crossing
      crossing:island: 'yes'
    enabled: true
  attributes:
  - name: footway
    osm_tag: footway
    after: []
    description: Raw OSM footway tag — input to the functional_class footway_wide
      flag.
  - name: tracktype
    osm_tag: tracktype
    after: []
    description: Raw OSM tracktype tag — functional_class input.
  - name: golf
    osm_tag: golf
    after: []
    description: Raw OSM golf tag — input to the functional_class is_golf_path flag.
  - name: golf_cart
    osm_tag: golf_cart
    after: []
    description: Raw OSM golf_cart tag — input to the functional_class is_golf_path
      flag.
  - name: width
    osm_tag: width
    after: []
    description: Raw OSM width tag — input to the width_parsed derived attribute.
  - name: access
    osm_tag: access
    after: []
    description: Raw OSM access tag — input to the functional_class access_ok flag.
  - name: oneway
    osm_tag: oneway
    after: []
    description: Raw OSM oneway tag — input to the one_way_car attribute.
  - name: oneway:bicycle
    osm_tag: oneway:bicycle
    after: []
    description: Raw OSM oneway:bicycle tag — input to the bike_infra attribute.
  - name: one_way_car
    extra_tags: []
    after: []
    description: 'Intermediate one-way direction flag from OSM oneway tag. ''ft''
      = forward, ''tf'' = backward. Used by bike_infra and lanes attributes. Reads
      the oneway primary attribute''s column (Phase 35g).

      '
    compute:
      rules:
      - id: ft
        when:
          oneway:
            in:
            - '1'
            - 'yes'
        set:
          one_way_car: ft
      - id: tf
        when:
          oneway: '-1'
        set:
          one_way_car: tf
      default:
        one_way_car: null
  - name: speed_parsed
    extra_tags:
    - maxspeed
    after: []
    description: 'speed_limit (mph). Observed from the OSM maxspeed tag; the fallback
      passes fill remaining nulls from the city/state residential defaults then a
      per-functional-class default (Phase 35f — was the impute stage''s speed_imputation
      ruleset). Rows filled by a fallback pass are flagged speed_limit_imputed=True.

      '
    compute:
      rules:
      - id: from_maxspeed
        when:
          maxspeed: present
        set:
          speed_limit:
            $apply: parse_speed_mph
            to: maxspeed
            bare_unit:
              $var: speed_bare_unit
      default: {}
    fallback:
      sets:
        speed_40_fcs:
        - primary
        - primary_link
        - secondary
        - secondary_link
        - trunk
        - trunk_link
        speed_55_fcs:
        - motorway
        - motorway_link
        speed_30_fcs:
        - tertiary
        - tertiary_link
        speed_25_fcs:
        - residential
        - unclassified
        speed_15_fcs:
        - living_street
        - track
        - path
      rules:
      - when:
          speed_limit: is_null
        rules:
        - id: speed_residential_default
          when:
            functional_class: residential
          set:
            speed_limit:
              $cascade:
              - $var: city_default_speed
              - $var: state_default_speed
        - id: speed_40
          when:
            functional_class: $speed_40_fcs
          set:
            speed_limit: 40.0
        - id: speed_55
          when:
            functional_class: $speed_55_fcs
          set:
            speed_limit: 55.0
        - id: speed_30
          when:
            functional_class: $speed_30_fcs
          set:
            speed_limit: 30.0
        - id: speed_25
          when:
            functional_class: $speed_25_fcs
          set:
            speed_limit: 25.0
        - id: speed_15
          when:
            functional_class: $speed_15_fcs
          set:
            speed_limit: 15.0
      default: {}
  - name: lanes_ft
    extra_tags:
    - turn:lanes:forward
    - turn:lanes
    - lanes:forward
    - lanes
    - lanes:backward
    - turn:lanes:backward
    after: []
    description: 'Raw OSM lanes → ft_lanes (forward direction). Priority: turn:lanes:forward
      > turn:lanes (oneway ft) > lanes:forward > lanes (oneway ft) > lanes (two-way,
      ceil÷2). Fallback passes fill remaining nulls from per-functional-class defaults,
      skipping the opposite one-way direction (Phase 35f — was the impute lane_imputation
      ruleset); fallback-filled rows are flagged {ft,tf}_lanes_imputed=True.

      '
    compute:
      rules:
      - id: from_tl_fwd
        when:
          turn:lanes:forward: present
        set:
          ft_lanes:
            $apply: count_pipes
            to: turn:lanes:forward
      - id: from_tl_all_ft
        when:
          turn:lanes: present
          oneway:
            in:
            - '1'
            - 'yes'
        set:
          ft_lanes:
            $apply: count_pipes
            to: turn:lanes
      - id: from_l_fwd
        when:
          lanes:forward: present
        set:
          ft_lanes:
            $apply: parse_int
            to: lanes:forward
      - id: from_l_all_ft
        when:
          lanes: present
          oneway:
            in:
            - '1'
            - 'yes'
        set:
          ft_lanes:
            $apply: parse_int
            to: lanes
      - id: from_l_all_two_way_null
        when:
          lanes: present
          oneway: absent
        set:
          ft_lanes:
            $apply: parse_int_half
            to: lanes
      - id: from_l_all_two_way_no
        when:
          lanes: present
          oneway: 'no'
        set:
          ft_lanes:
            $apply: parse_int_half
            to: lanes
      default: {}
    fallback:
      sets:
        lanes_multi_fcs:
        - primary
        - primary_link
        - secondary
        - secondary_link
        - trunk
        - trunk_link
        - motorway
        - motorway_link
        lanes_single_fcs:
        - tertiary
        - tertiary_link
        - residential
        - living_street
        - unclassified
        - track
        - path
      rules:
      - when:
          ft_lanes: is_null
          one_way_car:
            not_in:
            - tf
        rules:
        - id: lanes_ft_multi
          when:
            functional_class: $lanes_multi_fcs
          set:
            ft_lanes: 2.0
        - id: lanes_ft_single
          when:
            functional_class: $lanes_single_fcs
          set:
            ft_lanes: 1.0
      default: {}
  - name: lanes_tf
    extra_tags:
    - turn:lanes:backward
    - turn:lanes
    - lanes:backward
    - lanes
    - lanes:forward
    - turn:lanes:forward
    after: []
    description: 'Raw OSM lanes → tf_lanes (backward direction). Priority: turn:lanes:backward
      > turn:lanes (oneway tf) > lanes:backward > lanes (oneway tf) > lanes (two-way,
      ceil÷2). Fallback passes fill remaining nulls from per-functional-class defaults,
      skipping the opposite one-way direction (Phase 35f — was the impute lane_imputation
      ruleset); fallback-filled rows are flagged {ft,tf}_lanes_imputed=True.

      '
    compute:
      rules:
      - id: from_tl_bwd
        when:
          turn:lanes:backward: present
        set:
          tf_lanes:
            $apply: count_pipes
            to: turn:lanes:backward
      - id: from_tl_all_tf
        when:
          turn:lanes: present
          oneway: '-1'
        set:
          tf_lanes:
            $apply: count_pipes
            to: turn:lanes
      - id: from_l_bwd
        when:
          lanes:backward: present
        set:
          tf_lanes:
            $apply: parse_int
            to: lanes:backward
      - id: from_l_all_tf
        when:
          lanes: present
          oneway: '-1'
        set:
          tf_lanes:
            $apply: parse_int
            to: lanes
      - id: from_l_all_two_way_null
        when:
          lanes: present
          oneway: absent
        set:
          tf_lanes:
            $apply: parse_int_half
            to: lanes
      - id: from_l_all_two_way_no
        when:
          lanes: present
          oneway: 'no'
        set:
          tf_lanes:
            $apply: parse_int_half
            to: lanes
      default: {}
    fallback:
      sets:
        lanes_multi_fcs:
        - primary
        - primary_link
        - secondary
        - secondary_link
        - trunk
        - trunk_link
        - motorway
        - motorway_link
        lanes_single_fcs:
        - tertiary
        - tertiary_link
        - residential
        - living_street
        - unclassified
        - track
        - path
      rules:
      - when:
          tf_lanes: is_null
          one_way_car:
            not_in:
            - ft
        rules:
        - id: lanes_tf_multi
          when:
            functional_class: $lanes_multi_fcs
          set:
            tf_lanes: 2.0
        - id: lanes_tf_single
          when:
            functional_class: $lanes_single_fcs
          set:
            tf_lanes: 1.0
      default: {}
  - name: width_parsed
    extra_tags: []
    after:
    - width
    description: 'width_ft (road width, integer feet) parsed from the OSM width tag
      with PostgreSQL INT-truncation semantics (Phase 35f — was the impute stage''s
      width parse). No fallback: there are no functional-class width defaults, so
      no width_ft_imputed companion column is produced (unused-flag avoidance).

      '
    compute:
      rules:
      - id: from_width
        when:
          width: present
        set:
          width_ft:
            $apply: parse_width_int
            to: width
      default: {}
  - name: bike_infra
    extra_tags:
    - cycleway
    - cycleway:left
    - cycleway:right
    - cycleway:both
    - cycleway:buffer
    - cycleway:left:buffer
    - cycleway:right:buffer
    - cycleway:both:buffer
    - cycleway:left:oneway
    - cycleway:right:oneway
    after:
    - one_way_car
    description: 'ft/tf_bike_infra (track/lane/sharrow/buffered_lane), one_way (bike
      direction). Mirrors features/bike_infra.sql. one_way_car must be present (after:
      [one_way_car]).

      '
    compute:
      sets:
        buf_sides:
        - 'yes'
        - both
        - right
        - left
        off_fwd:
        - 'yes'
        - 'no'
        off_back:
        - '-1'
        - 'no'
      passes:
      - name: infra
        rules:
        - id: both_sharrow
          when:
            cycleway:both: shared_lane
          set:
            ft_bike_infra: sharrow
            tf_bike_infra: sharrow
        - id: both_buffered_lane
          when:
            cycleway:both: buffered_lane
          set:
            ft_bike_infra: buffered_lane
            tf_bike_infra: buffered_lane
        - id: both_lane_buf
          when:
            cycleway:both: lane
            cycleway:buffer: $buf_sides
          set:
            ft_bike_infra: buffered_lane
            tf_bike_infra: buffered_lane
        - id: both_lane_both_buf
          when:
            cycleway:both: lane
            cycleway:both:buffer: $buf_sides
          set:
            ft_bike_infra: buffered_lane
            tf_bike_infra: buffered_lane
        - id: both_lane
          when:
            cycleway:both: lane
          set:
            ft_bike_infra: lane
            tf_bike_infra: lane
        - id: both_track
          when:
            cycleway:both: track
          set:
            ft_bike_infra: track
            tf_bike_infra: track
        - id: cw_r_track_ob_no
          when:
            cycleway:right: track
            oneway:bicycle: 'no'
          set:
            ft_bike_infra: track
            tf_bike_infra: track
        - id: cw_r_track_ow_no
          when:
            cycleway:right: track
            cycleway:right:oneway: 'no'
          set:
            ft_bike_infra: track
            tf_bike_infra: track
        - id: cw_l_track_ob_no
          when:
            cycleway:left: track
            oneway:bicycle: 'no'
          set:
            ft_bike_infra: track
            tf_bike_infra: track
        - id: cw_l_track_ow_no
          when:
            cycleway:left: track
            cycleway:left:oneway: 'no'
          set:
            ft_bike_infra: track
            tf_bike_infra: track
        - id: cw_track_ob_no
          when:
            cycleway: track
            oneway:bicycle: 'no'
          set:
            ft_bike_infra: track
            tf_bike_infra: track
        - for:
          - dir: ft
            prim: left
            sec: right
            cgate: tf
            two_prim: right
            two_off: left
            prim_excl: '-1'
            off_set: off_fwd
          - dir: tf
            prim: right
            sec: left
            cgate: ft
            two_prim: left
            two_off: right
            prim_excl: 'yes'
            off_set: off_back
          rules:
          - id: <dir>_owc_oneway
            when:
              one_way_car: <dir>
            rules:
            - id: <dir>_cw_p_sharrow
              when:
                cycleway:<prim>: shared_lane
              set:
                <dir>_bike_infra: sharrow
            - id: <dir>_cw_p_buf_with_buf
              when:
                cycleway:<prim>: lane
                cycleway:<prim>:oneway:
                  ne: '-1'
                cycleway:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_cw_p_buf_with_p_buf
              when:
                cycleway:<prim>: lane
                cycleway:<prim>:oneway:
                  ne: '-1'
                cycleway:<prim>:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_cw_p_lane
              when:
                cycleway:<prim>: lane
                cycleway:<prim>:oneway:
                  ne: '-1'
              set:
                <dir>_bike_infra: lane
            - id: <dir>_cw_p_track
              when:
                cycleway:<prim>: track
                cycleway:<prim>:oneway:
                  ne: '-1'
              set:
                <dir>_bike_infra: track
            - id: <dir>_cw_sharrow
              when:
                cycleway: shared_lane
              set:
                <dir>_bike_infra: sharrow
            - id: <dir>_cw_s_sharrow
              when:
                cycleway:<sec>: shared_lane
              set:
                <dir>_bike_infra: sharrow
            - id: <dir>_cw_buffered_lane
              when:
                cycleway: buffered_lane
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_cw_s_buffered_lane
              when:
                cycleway:<sec>: buffered_lane
                cycleway:<sec>:oneway:
                  ne: '-1'
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_cw_lane_buf
              when:
                cycleway: lane
                cycleway:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_cw_s_lane_buf
              when:
                cycleway:<sec>: lane
                cycleway:<sec>:oneway:
                  ne: '-1'
                cycleway:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_cw_s_lane_s_buf
              when:
                cycleway:<sec>: lane
                cycleway:<sec>:oneway:
                  ne: '-1'
                cycleway:<sec>:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_cw_lane
              when:
                cycleway: lane
              set:
                <dir>_bike_infra: lane
            - id: <dir>_cw_s_lane
              when:
                cycleway:<sec>: lane
                cycleway:<sec>:oneway:
                  ne: '-1'
              set:
                <dir>_bike_infra: lane
            - id: <dir>_cw_track
              when:
                cycleway: track
              set:
                <dir>_bike_infra: track
            - id: <dir>_cw_s_track
              when:
                cycleway:<sec>: track
                cycleway:<sec>:oneway:
                  ne: '-1'
              set:
                <dir>_bike_infra: track
          - id: <dir>_owc_contra
            when:
              one_way_car: <cgate>
            rules:
            - id: <dir>_opp_cw_lane_buf
              when:
                cycleway: opposite_lane
                cycleway:buffer: $buf_sides
              set:
                <dir>_bike_infra: buffered_lane
            - id: <dir>_opp_cw_r_lane_buf
