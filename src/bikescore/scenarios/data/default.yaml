  - name: cls_tf_multi
    extra_tags: []
    after:
    - lanes_tf
    description: tf_lanes > 1 (observed, pre-imputation). Was class_adjust_context.
    compute:
      rules:
      - id: tf_multi
        when:
          tf_lanes:
            gt: 1
        set:
          cls_tf_multi: true
      default:
        cls_tf_multi: false
    persist: false
  - name: cls_speed_high
    extra_tags: []
    after:
    - speed_parsed
    description: speed_limit >= 30 (observed, pre-imputation). Was class_adjust_context.
    compute:
      rules:
      - id: speed_high
        when:
          speed_limit:
            ge: 30
        set:
          cls_speed_high: true
      default:
        cls_speed_high: false
    persist: false
  - name: functional_class
    extra_tags: []
    after:
    - access_ok
    - footway_wide
    - is_golf_path
    - cls_both_lane
    - cls_ft_multi
    - cls_tf_multi
    - cls_speed_high
    description: 'Road functional class from the OSM highway tag (pass 1), then residential/unclassified
      -> tertiary promotion (pass 2). Reads the access_ok / footway_wide / is_golf_path
      / cls_* flag columns. Migrated from the functional_class ruleset (Phase 35n).

      '
    compute:
      sets:
        bike_access:
        - 'yes'
        - permissive
        - designated
      passes:
      - name: functional_class
        rules:
        - id: fc_pedestrian
          when:
            highway: pedestrian
            bicycle: $bike_access
            access_ok: true
          set:
            functional_class: living_street
        - id: fc_path_golf
          when:
            highway: path
            is_golf_path: true
            access_ok: true
          set:
            functional_class: unclassified
        - id: fc_service
          when:
            highway: service
            bicycle: $bike_access
            access_ok: true
          set:
            functional_class: unclassified
        - id: fc_footway_wide
          when:
            highway: footway
            bicycle: $bike_access
            access_ok: true
            footway_wide: true
          set:
            functional_class: path
        - id: fc_footway_crossing
          when:
            highway: footway
            footway:
            - crossing
            - traffic_island
            access_ok: true
          set:
            functional_class: path
            xwalk: 1
        - id: fc_path_cycleway
          when:
            highway:
            - cycleway
            - path
            access_ok: true
          set:
            functional_class: path
        - id: fc_track_grade1
          when:
            highway: track
            tracktype: grade1
            access_ok: true
          set:
            functional_class: track
        map:
          field: highway
          to: functional_class
          when:
            access_ok: true
          table:
            motorway: motorway
            trunk: trunk
            primary: primary
            secondary: secondary
            tertiary: tertiary
            motorway_link: motorway_link
            trunk_link: trunk_link
            primary_link: primary_link
            secondary_link: secondary_link
            tertiary_link: tertiary_link
            unclassified: unclassified
            residential: residential
            living_street: living_street
          default: null
      - name: class_promotion
        after: functional_class
        for:
          flag:
          - cls_both_lane
          - cls_ft_multi
          - cls_tf_multi
          - cls_speed_high
        rules:
        - id: promote_<flag>
          when:
            functional_class:
            - residential
            - unclassified
            <flag>: true
          set:
            functional_class: tertiary
rule_sets:
  stress_intersection:
    name: intersection_stress
    sets:
      lesser_fcs:
      - residential
      - unclassified
      - living_street
      - track
      - path
      link_fcs:
      - motorway_link
      - trunk_link
      - primary_link
      - secondary_link
      - tertiary_link
    predicates:
      unprotected_ft:
        node_signalized_ft: false
        node_stop_ft: false
      unprotected_tf:
        node_signalized_tf: false
        node_stop_tf: false
    passes:
    - name: int_stress
      for:
        dir:
        - ft
        - tf
      rules:
      - id: lesser_high_crossing
        when:
          adj_fc: $lesser_fcs
          use: unprotected_<dir>
          has_high_cross_<dir>: true
        set:
          <dir>_int_stress: 3
      - id: tertiary_high_crossing
        when:
          adj_fc: tertiary
          use: unprotected_<dir>
          has_high_cross_no_tert_<dir>: true
        set:
          <dir>_int_stress: 3
      default:
        <dir>_int_stress: 1
    - name: int_stress_link_reset
      after: int_stress
      rules:
      - id: link_reset
        when:
          adj_fc: $link_fcs
        set:
          ft_int_stress: 1
          tf_int_stress: 1
  stress_segment:
    name: segment_stress
    sets:
      motorway_trunk_fcs:
      - motorway
      - trunk
      - motorway_link
      - trunk_link
      primary_fcs:
      - primary
      - primary_link
      secondary_fcs:
      - secondary
      - secondary_link
      tertiary_fcs:
      - tertiary
      - tertiary_link
    passes:
    - name: seg_stress
      for:
        dir:
        - ft
        - tf
      rules:
      - id: motorway_trunk
        when:
          adj_fc: $motorway_trunk_fcs
        set:
          <dir>_seg_stress: 3
      - id: path_track
        when:
          adj_fc:
          - path
          - track
        set:
          <dir>_seg_stress: 1
      - id: living_street_bicycle_no
        when:
          adj_fc: living_street
          bicycle: 'no'
        set:
          <dir>_seg_stress: 3
      - id: living_street
        when:
          adj_fc: living_street
        set:
          <dir>_seg_stress: 1
      - for:
          fcg:
          - primary
          - secondary
          - tertiary
        when:
          adj_fc: $<fcg>_fcs
        rules:
        - id: <fcg>_track
          when:
            <dir>_bike_infra: track
          set:
            <dir>_seg_stress: 1
        - when:
            <dir>_bike_infra: buffered_lane
          rules:
          - id: <fcg>_buffered_low
            when:
              speed_limit:
                le: 25
              <dir>_lanes:
                le: 1
            set:
              <dir>_seg_stress: 1
          - id: <fcg>_buffered_high
            set:
              <dir>_seg_stress: 3
        - when:
            <dir>_bike_infra: lane
          rules:
          - id: <fcg>_lane_low
            when:
              speed_limit:
                le: 20
              <dir>_lanes:
                le: 1
              <dir>_bike_infra_width:
                ge: 4
            set:
              <dir>_seg_stress: 1
          - id: <fcg>_lane_high
            set:
              <dir>_seg_stress: 3
        - id: <fcg>_shared_low
          when:
            speed_limit:
              le: 15
            <dir>_lanes: 1
          set:
            <dir>_seg_stress: 1
        - id: <fcg>_default
          set:
            <dir>_seg_stress: 3
      - id: residential
        when:
          adj_fc: residential
        rules:
        - id: residential_low
          when:
            speed_limit:
              le: 25
          set:
            <dir>_seg_stress: 1
        - id: residential_high
          set:
            <dir>_seg_stress: 3
      - id: unclassified
        when:
          adj_fc: unclassified
        rules:
        - id: unclassified_low
          when:
            speed_limit:
              le: 25
          set:
            <dir>_seg_stress: 1
        - id: unclassified_high
          set:
            <dir>_seg_stress: 3
