            to: cycleway:right:width
      - id: tf_w_from_both
        when:
          tf_bike_infra: present
          cycleway:both:width: present
        set:
          tf_bike_infra_width:
            $apply: parse_width_ft
            to: cycleway:both:width
      - id: tf_w_from_generic
        when:
          tf_bike_infra: present
          cycleway:width: present
        set:
          tf_bike_infra_width:
            $apply: parse_width_ft
            to: cycleway:width
      default: {}
  - name: parking
    extra_tags:
    - parking:lane:both
    - parking:lane:right
    - parking:lane:left
    - parking:both
    - parking:right
    - parking:left
    - parking:both:restriction
    - parking:right:restriction
    - parking:left:restriction
    after: []
    description: 'ft/tf_park (1=parking present, 0=no parking) from OSM parking tags.
      Direction-specific tags (right/left) override the both-side result. Priority:
      direction-specific > both-side. Mirrors features/park.sql.

      '
    compute:
      rules:
      - id: ft_park_lane_right_present
        when:
          parking:lane:right:
            in:
            - parallel
            - paralell
            - diagonal
            - perpendicular
        set:
          ft_park: 1
      - id: ft_park_lane_right_none
        when:
          parking:lane:right:
            in:
            - no_parking
            - no_stopping
        set:
          ft_park: 0
      - id: ft_park_right_lane
        when:
          parking:right: lane
        set:
          ft_park: 1
      - id: ft_park_right_no
        when:
          parking:right: 'no'
        set:
          ft_park: 0
      - id: ft_park_right_restriction
        when:
          parking:right:restriction:
            in:
            - no_stopping
            - no_parking
        set:
          ft_park: 0
      - id: ft_park_lane_both_present
        when:
          parking:lane:both:
            in:
            - parallel
            - paralell
            - diagonal
            - perpendicular
        set:
          ft_park: 1
      - id: ft_park_lane_both_none
        when:
          parking:lane:both:
